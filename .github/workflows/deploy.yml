name: Deploy to Firebase Hosting

# main 브랜치에 kids-dashboard 변경이 푸시되면 자동 배포.
# Actions 탭에서 "Run workflow" 로 수동 실행도 가능.
on:
  push:
    branches: [main]
    paths:
      - "kids-dashboard/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kids-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kids-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (inject Firebase + Maps config)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_KID_EMAIL: ${{ secrets.VITE_KID_EMAIL }}
          VITE_MOM_EMAIL: ${{ secrets.VITE_MOM_EMAIL }}
          VITE_AUTH_SUFFIX: ${{ secrets.VITE_AUTH_SUFFIX }}
          VITE_KAKAO_MAPS_KEY: ${{ secrets.VITE_KAKAO_MAPS_KEY }}

      - name: Deploy Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: ./kids-dashboard

      - name: Deploy Firestore rules
        continue-on-error: true
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          SA_EMAIL=$(node -e "process.stdout.write(require('$RUNNER_TEMP/sa.json').client_email||'(알 수 없음)')")
          echo "▶ 규칙 게시에 사용하는 서비스 계정: $SA_EMAIL"
          if npx --yes firebase-tools deploy --only firestore:rules --project "$PROJECT_ID" --non-interactive; then
            echo "✅ Firestore 규칙 자동 게시 완료"
          else
            echo "::warning::❌ Firestore 규칙 자동 게시 실패 (호스팅 배포는 정상)."
            echo "::warning::아래 서비스 계정에 역할을 부여하세요:"
            echo "::warning::    $SA_EMAIL"
            echo "::warning::가장 간단: '편집자(Editor)' 역할 1개 추가"
            echo "::warning::또는 최소권한: 'Firebase Rules Admin' + '서비스 사용량 소비자(Service Usage Consumer)' 2개"
            echo "::warning::Google Cloud Console → IAM → 위 계정 → 역할 추가 → 저장"
            echo "::warning::권한 부여 후 Actions 에서 이 워크플로를 다시 실행하면 규칙이 게시됩니다."
          fi
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
