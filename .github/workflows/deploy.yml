name: Deploy to Firebase Hosting

# main 브랜치에 kids-dashboard 변경이 푸시되면 자동 배포.
# Actions 탭에서 "Run workflow" 로 수동 실행도 가능.
on:
  push:
    branches: [main]
    paths:
      - "kids-dashboard/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kids-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kids-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (inject Firebase + Maps config)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_KID_EMAIL: ${{ secrets.VITE_KID_EMAIL }}
          VITE_MOM_EMAIL: ${{ secrets.VITE_MOM_EMAIL }}
          VITE_AUTH_SUFFIX: ${{ secrets.VITE_AUTH_SUFFIX }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Deploy Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: ./kids-dashboard

      - name: Deploy Firestore rules
        continue-on-error: true
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools deploy --only firestore:rules --project "$PROJECT_ID" --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
